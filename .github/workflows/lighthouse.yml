name: Lighthouse CI

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Serve dist
        run: npx http-server ./dist -p 8080 & sleep 2

      - name: Run Lighthouse (desktop)
        run: npx lighthouse http://localhost:8080 --preset=desktop --output=json --output-path=./lighthouse-desktop.json --no-enable-error-reporting

      - name: Run Lighthouse (mobile)
        run: npx lighthouse http://localhost:8080 --emulated-form-factor=mobile --output=json --output-path=./lighthouse-mobile.json --no-enable-error-reporting

      - name: Upload Lighthouse reports
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-reports
          path: |
            ./lighthouse-desktop.json
            ./lighthouse-mobile.json
