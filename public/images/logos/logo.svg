<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Hingula Vidya Pitha, Bhotaka — Estd. 1992">
  <defs>
    <linearGradient id="hv-ring" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#0b1d52"/>
    </linearGradient>
    <linearGradient id="hv-monogram" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#facc15"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
    <path id="hv-top" d="M 100,100 m -78,0 a 78,78 0 1 1 156,0" fill="none"/>
    <path id="hv-bottom" d="M 100,100 m -72,0 a 72,72 0 1 0 144,0" fill="none"/>
  </defs>

  <!-- Outer disc -->
  <circle cx="100" cy="100" r="96" fill="url(#hv-ring)"/>
  <circle cx="100" cy="100" r="92" fill="none" stroke="#facc15" stroke-width="1.2" opacity="0.7"/>
  <circle cx="100" cy="100" r="66" fill="#f8fafc"/>
  <circle cx="100" cy="100" r="66" fill="none" stroke="#1e3a8a" stroke-width="1.4"/>

  <!-- Curved name top -->
  <text font-family="Georgia, 'Times New Roman', serif" font-weight="700" fill="#facc15" font-size="13" letter-spacing="2">
    <textPath href="#hv-top" startOffset="50%" text-anchor="middle">HINGULA VIDYAPITHA</textPath>
  </text>

  <!-- Curved location bottom -->
  <text font-family="Georgia, 'Times New Roman', serif" font-weight="600" fill="#facc15" font-size="9" letter-spacing="1.4">
    <textPath href="#hv-bottom" startOffset="50%" text-anchor="middle">AT/PO-BHOTAKA · DIST-JAJPUR</textPath>
  </text>

  <!-- Side stars -->
  <g fill="#facc15">
    <circle cx="14" cy="100" r="2.4"/>
    <circle cx="186" cy="100" r="2.4"/>
  </g>

  <!-- HV monogram -->
  <text x="100" y="108" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="58" fill="url(#hv-monogram)" letter-spacing="-2">HV</text>

  <!-- Lamp / book glyph -->
  <g transform="translate(100,70)" fill="#1e3a8a">
    <path d="M -12 0 L 12 0 L 10 -8 L -10 -8 Z" opacity="0.85"/>
    <circle cx="0" cy="-12" r="2.4" fill="#facc15"/>
  </g>

  <!-- ESTD banner -->
  <g transform="translate(100,150)">
    <rect x="-26" y="-9" width="52" height="18" rx="3" fill="#1e3a8a"/>
    <rect x="-26" y="-9" width="52" height="18" rx="3" fill="none" stroke="#facc15" stroke-width="1"/>
    <text x="0" y="4" text-anchor="middle" font-family="Georgia, serif" font-weight="700" font-size="10" fill="#facc15" letter-spacing="1.5">ESTD-1992</text>
  </g>
</svg>
